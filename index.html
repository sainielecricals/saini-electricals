<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saini Electricals – Roorkee</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- CHAT BUTTON -->
<div id="chatButton" onclick="toggleChat()">💬</div>

<!-- CHAT BOX -->
<div id="chatBox" class="hidden">
  <div class="chat-header">
    Saini Electricals Assistant
    <span onclick="toggleChat()">✖</span>
  </div>

  <div id="chatMessages" class="chat-messages"></div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Ask something..."
      onkeypress="if(event.key==='Enter')sendMessage()">
    <button id="voiceBtn" onclick="startVoice()">🎤</button>
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<header class="hero">
  <h1>⚡ SAINI ELECTRICALS – ROORKEE</h1>
  <p>Lighting • Solar • Fans • AC • Inverter • Home Appliances</p>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search products..." onkeyup="searchProducts()">
</div>

<div class="filter-bar" id="filterBar"></div>
<div id="products"></div>

<footer>
  📍 Roorkee | 📞 9548021272 <br>
  © 2026 Saini Electricals
</footer>

<script src="script.js"></script>
</body>
</html>
